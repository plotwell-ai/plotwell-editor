<noscript>
  <div style="max-width:700px;margin:60px auto;padding:24px;font-family:sans-serif;text-align:center;">
    <h1>plotwell editor — Free Open Source Screenplay Editor</h1>
    <p>A free, open-source screenplay editor with industry-standard Hollywood formatting, real-time pagination, and scene numbers. Import Fountain and Final Draft files, export to PDF.</p>

<div id="editor-wrap">
  <div class="plotwell-editor-wrap">
    <div id="editor"></div>

<script type="module">
  import "../src/styles.css";
  import { PlotwellEditor, schema } from "../src/index.ts";
  import { toggleMark } from "prosemirror-commands";

  const sampleFountain = `FADE IN:

INT. COFFEE SHOP - BUENOS AIRES - DAY

A crowded cafe on Avenida Corrientes. Ceiling fans spin lazily overhead. Morning light streams through tall windows, casting warm rectangles across the checkered floor.

LUCIA (30s, sharp eyes, leather jacket draped over her chair) sits alone at a corner table. A cold espresso sits untouched in front of her. She watches the door.

The bell above the entrance rings. MARIO (40s, rumpled linen suit, loosened tie) pushes through. He scans the room, spots her, and hesitates for a beat before crossing.

MARIO
You said noon.

LUCIA
I said "be on time." There's a difference.

He drops into the chair across from her. Runs a hand through his hair.

MARIO
The producers called again. Twice.

LUCIA
And?

MARIO
(leaning forward)
They want pages, Lucia. Sixty at least. By Friday.

LUCIA
(a beat, then smiling)
I burned the script.

MARIO
You what?

LUCIA
Every page. All of it. Gone.

A long silence. Mario stares at her. She finally lifts her espresso and takes a slow sip. Perfectly calm.

MARIO
Tell me you're joking.

LUCIA
I'm rewriting it. From scratch. The whole thing. The story was wrong, Mario. It was always wrong, and we both know it.

Mario leans back. Exhales.

MARIO
We have a deal. We have a schedule.

LUCIA
We have a chance to make something real. Or we can turn in sixty pages of something safe that nobody will remember.

She reaches into her bag and pulls out a single handwritten page. Slides it across the table.

LUCIA (CONT'D)
Read it.

Mario picks up the page. His expression shifts as he reads -- skepticism giving way to something else. He looks up.

MARIO
(quietly)
Where did this come from?

LUCIA
Last night. Three in the morning. It just... arrived.

CUT TO:

EXT. ROOFTOP - NIGHT

City lights spread to the horizon. Wind whips through Lucia's hair as she stands at the edge of a rooftop terrace, arms spread wide. Below her, handwritten script pages drift down into the darkness like snow.

She turns back. A small table holds a typewriter, a fresh sheet already loaded. A glass of red wine. The city hums beneath her.

She sits. Cracks her knuckles. Begins to type. We hold on her face -- determined, alive, free.

LUCIA (V.O.)
Every good story starts the same way. You let go of the last one.

The typewriter keys clatter. We pull back slowly, revealing the full skyline of Buenos Aires stretching out behind her, glittering.

FADE OUT.`;

  const editor = new PlotwellEditor({
    container: document.getElementById("editor"),
    content: sampleFountain,
    attribution: true,
    bubbleMenu: true,
    typeBadge: true,
  });

  // --- Node type label ---
  const labels = {
    sceneHeading:   "SCENE HEADING",
    action:         "ACTION",
    character:      "CHARACTER",
    dialogue:       "DIALOGUE",
    parenthetical:  "PARENTHETICAL",
    transition:     "TRANSITION",
  };

  function updateLabel() {
    const sel = editor.view.state.selection;
    const type = sel.$from.parent.type.name;
    document.getElementById("node-type-label").textContent = labels[type] || type;
  }

  editor.view.dom.addEventListener("keyup", updateLabel);
  editor.view.dom.addEventListener("mouseup", updateLabel);
  updateLabel();

  // --- Bold / Italic / Underline ---
  function runMark(markName) {
    toggleMark(schema.marks[markName])(editor.view.state, editor.view.dispatch);
    editor.view.focus();
  }

  document.getElementById("btn-bold").onclick = () => runMark("bold");
  document.getElementById("btn-italic").onclick = () => runMark("italic");
  document.getElementById("btn-underline").onclick = () => runMark("underline");

  // --- File import ---
  const fileInput = document.getElementById("file-input");

  document.getElementById("btn-open-file").onclick = () => fileInput.click();

  fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const ext = (file.name.split(".").pop() || "").toLowerCase();
      if (ext === "fdx") editor.importFDX(reader.result);
      else editor.importFountain(reader.result);
      editor.view.focus();
    };
    reader.readAsText(file);
    fileInput.value = "";
  });

  // --- Paste fountain ---
  document.getElementById("btn-paste-fountain").onclick = () => {
    document.getElementById("import-modal").classList.add("open");
    document.getElementById("fountain-text").value = "";
    setTimeout(() => document.getElementById("fountain-text").focus(), 50);
  };

  document.getElementById("btn-import-confirm").onclick = () => {
    const text = document.getElementById("fountain-text").value;
    if (text.trim()) editor.importFountain(text);
    document.getElementById("import-modal").classList.remove("open");
    editor.view.focus();
  };

  document.getElementById("btn-import-cancel").onclick = () => {
    document.getElementById("import-modal").classList.remove("open");
    editor.view.focus();
  };

  // --- Exports ---
  // --- PDF export with cover page modal ---
  document.getElementById("btn-export-pdf").onclick = () => {
    document.getElementById("cover-draft").value = "Draft - " + new Date().toLocaleDateString();
    document.getElementById("cover-modal").classList.add("open");
    document.getElementById("cover-title").focus();
  };

  document.getElementById("btn-cover-export").onclick = () => {
    const title = document.getElementById("cover-title").value.trim();
    const author = document.getElementById("cover-author").value.trim();
    const basedOn = document.getElementById("cover-based-on").value.trim();
    const draftDate = document.getElementById("cover-draft").value.trim();
    const contactInfo = document.getElementById("cover-contact").value.trim();
    const copyright = document.getElementById("cover-copyright").value.trim();

    const hasCover = title || author;
    editor.toPDF({
      title: title || "Screenplay",
      coverPage: hasCover ? { title, author, basedOn, draftDate, contactInfo, copyright } : undefined,
    });
    document.getElementById("cover-modal").classList.remove("open");
  };

  document.getElementById("btn-cover-cancel").onclick = () => {
    document.getElementById("cover-modal").classList.remove("open");
  };

  document.getElementById("btn-export-fountain").onclick = () => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([editor.toFountain()], { type: "text/plain" }));
    a.download = "screenplay.fountain";
    a.click();
  };

  document.getElementById("btn-export-fdx").onclick = () => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([editor.toFDX()], { type: "application/xml" }));
    a.download = "screenplay.fdx";
    a.click();
  };

  // --- Reading mode ---
  const formatBtns = [document.getElementById("btn-bold"), document.getElementById("btn-italic"), document.getElementById("btn-underline")];

  document.getElementById("btn-reading").onclick = () => {
    editor.setReadingMode(!editor.readingMode);
    document.getElementById("btn-reading").classList.toggle("active", editor.readingMode);
    // Disable formatting buttons in reading mode
    formatBtns.forEach(btn => {
      btn.disabled = editor.readingMode;
      btn.style.opacity = editor.readingMode ? "0.3" : "";
      btn.style.pointerEvents = editor.readingMode ? "none" : "";
    });
  };

  // --- Dark mode ---
  document.getElementById("btn-dark").onclick = () => {
    const wrap = document.querySelector(".plotwell-editor-wrap");
    const isDark = wrap.classList.contains("pw-dark");
    editor.setDarkMode(!isDark);
    document.getElementById("btn-dark").classList.toggle("active", !isDark);
  };

  // --- Writing stats ---
  function updateStats() {
    const s = editor.getStats();
    document.getElementById("stats-label").textContent =
      `${s.sceneCount} scenes \u00B7 ${s.pageCount} pg \u00B7 ${s.wordCount} words \u00B7 ${s.dialoguePercentage}% dialogue`;
  }

  editor.view.dom.addEventListener("keyup", updateStats);
  setTimeout(updateStats, 500);

  // --- Escape key ---
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      document.getElementById("import-modal").classList.remove("open");
      document.getElementById("cover-modal").classList.remove("open");
      if (editor.readingMode) {
        editor.setReadingMode(false);
        document.getElementById("btn-reading").classList.remove("active");
        formatBtns.forEach(btn => { btn.disabled = false; btn.style.opacity = ""; btn.style.pointerEvents = ""; });
      }
    }
  });
</script>
